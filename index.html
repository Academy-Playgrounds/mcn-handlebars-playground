<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCN Handlebars Playground</title>
  <link rel="icon" type="image/png" href="/AcademyImage_AKey.png" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <a href="/" class="header-logo">
    <img
      src="AcademyImage_WhiteText.png"
      alt="ListEngage Academy"
      class="logo-img"
    >
  </a>
    <div class="header-left">
      <span class="header-title">MCN Handlebars Playground</span>
      <span class="badge">HBS</span>
      <span class="header-sub">Marketing Cloud Next · Handlebars.Net</span>
    </div>
    <div class="header-right">
      <label class="label" for="sampleSelect">Template:</label>
      <select id="sampleSelect"></select>
      <label class="label" for="dataFileSelect">Data file:</label>
      <select id="dataFileSelect"></select>
      <button id="reloadDataBtn" title="Re-read selected data file">↺ Reload</button>
    </div>
  </header>

  <!-- Main editors + output -->
  <div class="workspace">

    <!-- Left: editors -->
    <div class="panel panel-left">
      <div class="pane pane-template">
        <div class="pane-label">Template
          <span class="pane-hint">Handlebars syntax · auto-renders on change</span>
          <button id="checkHtmlBtn" class="btn-check-html" title="Check for unclosed or mismatched HTML tags">⚠ Check HTML</button>
        </div>
        <div id="templateEditor"></div>
      </div>
      <div class="pane-divider" id="hDivider" title="Drag to resize · Double-click to reset"></div>
      <div class="pane pane-data">
        <!-- Data tab bar -->
        <div class="data-tabs">
          <button class="data-tab active" data-tab="JSON">JSON Payload</button>
          <button class="data-tab" data-tab="datagraph">Data Graph</button>
        </div>
        <!-- JSON Payload panel -->
        <div class="data-tab-panel" id="panel-JSON">
          <div class="pane-label">
            JSON Payload
            <span class="pane-hint">OCP context · edit or load from <code>data/</code></span>
            <div class="tab-actions">
              <label class="btn-csv-upload" title="Parse CSV and load into editor">
                ↑ Upload CSV
                <input type="file" id="JSONCsvInput" accept=".csv">
              </label>
              <button id="JSONRemoveBtn" class="btn-remove-csv" style="display:none" title="Clear CSV data from this tab">✕ Remove CSV</button>
            </div>
          </div>
          <textarea id="dataEditor" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
        </div>
        <!-- Data Graph panel -->
        <div class="data-tab-panel hidden" id="panel-datagraph">
          <div class="pane-label">
            Data Graph
            <span class="pane-hint">$dataGraph · use <code>{{get (get @root "$dataGraph") "field"}}</code></span>
            <div class="tab-actions">
              <label class="btn-csv-upload" title="Parse CSV and load into editor">
                ↑ Upload CSV
                <input type="file" id="dataGraphCsvInput" accept=".csv">
              </label>
              <button id="dataGraphRemoveBtn" class="btn-remove-csv" style="display:none" title="Clear CSV data from this tab">✕ Remove CSV</button>
            </div>
          </div>
          <textarea id="dataGraphEditor" spellcheck="false" autocorrect="off" autocapitalize="off" placeholder="{}"></textarea>
        </div>
      </div>
    </div>

    <!-- Vertical splitter -->
    <div class="panel-divider" id="vDivider" title="Drag to resize · Double-click to reset"></div>

    <!-- Right: output -->
    <div class="panel panel-right">
      <div class="pane pane-output">
        <div class="pane-label">Output</div>
        <iframe id="outputFrame" sandbox="allow-same-origin"></iframe>
      </div>
      <div class="pane-divider"></div>
      <div class="pane pane-errors">
        <div class="pane-label">Console
          <button id="clearConsole" class="btn-tiny">Clear</button>
        </div>
        <div id="errorConsole"></div>
      </div>
    </div>

  </div>

  <!-- Bottom: Helper reference -->
  <div class="ref-bar" id="refBar">
    <div class="ref-tabs">
      <button class="ref-tab active" data-cat="object">Object &amp; List</button>
      <button class="ref-tab" data-cat="string">String</button>
      <button class="ref-tab" data-cat="datetime">Date &amp; Time</button>
      <button class="ref-tab" data-cat="comparison">Comparison</button>
      <button class="ref-tab" data-cat="utility">Utility</button>
      <button class="ref-tab" data-cat="math">Math</button>
      <button class="ref-tab" data-cat="deviations">⚠ Deviations</button>
      <button class="ref-tab ref-toggle" id="refToggle" title="Collapse reference panel">▼ Hide</button>
    </div>
    <div class="ref-content" id="refContent"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
